apiVersion: batch/v1
kind: Job
metadata:
  name: presync-delay-180s
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: delay
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "PreSync delay started";
              sleep 180;
              echo "PreSync delay finished";
